<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャゲーム</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.95);
  }

  #result {
    margin-top: 20px;
    font-size: 24px;
  }

  .card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
    min-width: 200px;
  }

  .N { background: #aaa; }
  .R { background: #4caf50; }
  .SR { background: #2196f3; }
  .SSR { background: #9c27b0; }

  .shine {
    animation: shine 1s infinite alternate;
  }

  @keyframes shine {
    from { box-shadow: 0 0 10px white; }
    to { box-shadow: 0 0 30px gold; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🎰 ガチャゲーム</h1>
  <button onclick="drawGacha()">ガチャを引く！</button>
  <div id="result"></div>
  <div id="card"></div>
</div>

<script>
const characters = [
  { name: "スライム", rarity: "N", rate: 60 },
  { name: "戦士", rarity: "R", rate: 25 },
  { name: "魔法使い", rarity: "SR", rate: 10 },
  { name: "ドラゴン", rarity: "SSR", rate: 5 }
];

function drawGacha() {
  let rand = Math.random() * 100;
  let sum = 0;
  let selected;

  for (let c of characters) {
    sum += c.rate;
    if (rand <= sum) {
      selected = c;
      break;
    }
  }

  showResult(selected);
}

function showResult(char) {
  const result = document.getElementById("result");
  const card = document.getElementById("card");

  result.textContent = "結果！";

  card.className = "card " + char.rarity;
  card.innerHTML = `\n    <h2>${char.rarity}</h2>\n    <p>${char.name}</p>\n  `;

  if (char.rarity === "SSR") {
    card.classList.add("shine");
  }
}
</script>

</body>
</html>
